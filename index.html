<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  #app {
    padding: 1rem 0;
    max-width: 700px;
    font-family: var(--font-sans);
  }
  h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }
  p.sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1.25rem;
  }
  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  #status {
    font-size: 12px;
    min-height: 20px;
    padding: 4px 0;
  }
  #status.ok {
    color: var(--color-text-success);
  }
  #status.err {
    color: var(--color-text-danger);
  }
  #status.loading {
    color: var(--color-text-warning);
  }
  #status.info {
    color: var(--color-text-secondary);
  }
  #viewport {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: var(--border-radius-md);
    overflow: hidden;
    display: none;
    aspect-ratio: 16/9;
  }
  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  #start-btn {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    cursor: pointer;
  }
  #start-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  #start-btn.running {
    border-color: #e24b4a88;
    color: #e24b4a;
  }
  #conf-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #conf-row label {
    font-size: 12px;
    color: var(--color-text-secondary);
    white-space: nowrap;
  }
  #conf-val {
    font-size: 12px;
    font-weight: 500;
    min-width: 28px;
  }
  #fps-badge {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-left: auto;
  }
  #legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 999px;
  }
  #det-panel {
    margin-top: 8px;
    min-height: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .det-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
  }

  /* model picker area */
  #pick-area {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  #file-pick-btn {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    cursor: pointer;
    white-space: nowrap;
  }
  #file-name {
    font-size: 12px;
    color: var(--color-text-secondary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #onnx-input {
    display: none;
  }

  /* progress bar */
  #prog-wrap {
    height: 3px;
    background: var(--color-border-tertiary);
    border-radius: 2px;
    margin-top: 8px;
    display: none;
    overflow: hidden;
  }
  #prog-bar {
    height: 100%;
    width: 0%;
    background: #1d9e75;
    border-radius: 2px;
    transition: width 0.1s;
  }
</style>

<div id="app">
  <h2>Real-time damage detector</h2>
  <p class="sub">
    YOLOv8n · live camera · pick your <code>best.onnx</code> from disk
  </p>

  <div class="card">
    <div id="prog-wrap"><div id="prog-bar"></div></div>
    <div id="status" class="info">Select your model file to begin</div>
    <div id="legend"></div>
  </div>

  <div class="card">
    <div id="controls">
      <button id="start-btn" disabled>Start camera</button>
      <div id="conf-row">
        <label>Confidence</label>
        <input
          type="range"
          id="conf-slider"
          min="5"
          max="90"
          step="1"
          value="25"
          style="width: 90px"
        />
        <span id="conf-val">0.25</span>
      </div>
      <span id="fps-badge">— fps</span>
    </div>
    <div id="viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <div id="det-panel"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script>
  const CLASSES = [
    "dent",
    "scratch",
    "crack",
    "glass_shatter",
    "tire_flat",
    "lamp_broken",
  ];
  const COLORS = [
    "#E24B4A",
    "#EF9F27",
    "#D4537E",
    "#7F77DD",
    "#1D9E75",
    "#378ADD",
  ];
  const INPUT = 640;
  const MODEL_PATH = "/best.onnx";

  let session = null;
  let stream = null;
  let running = false;
  let rafId = null;
  let confThresh = 0.25;
  let inferBusy = false;
  let lastFps = performance.now();
  let frames = 0;

  const statusEl = document.getElementById("status");
  const progWrap = document.getElementById("prog-wrap");
  const progBar = document.getElementById("prog-bar");
  const startBtn = document.getElementById("start-btn");
  const confSlider = document.getElementById("conf-slider");
  const confValEl = document.getElementById("conf-val");
  const fpsBadge = document.getElementById("fps-badge");
  const viewport = document.getElementById("viewport");
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const detPanel = document.getElementById("det-panel");
  const legend = document.getElementById("legend");

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || "info";
  }

  /* legend */
  CLASSES.forEach((c, i) => {
    const p = document.createElement("div");
    p.className = "pill";
    p.style.cssText = `background:${COLORS[i]}22;border:0.5px solid ${COLORS[i]}66;color:${COLORS[i]}`;
    p.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${COLORS[i]};display:inline-block;"></span>${c}`;
    legend.appendChild(p);
  });

  async function loadModel() {
    try {
      progWrap.style.display = "block";
      progBar.style.width = "0%";
      setStatus("Initializing ONNX runtime…", "loading");

      ort.env.wasm.wasmPaths =
        "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/";
      ort.env.wasm.numThreads = 1;

      progBar.style.width = "30%";

      session = await ort.InferenceSession.create(MODEL_PATH, {
        executionProviders: ["wasm"],
        graphOptimizationLevel: "all",
      });

      progBar.style.width = "100%";
      progWrap.style.display = "none";
      setStatus("Model ready — start the camera", "ok");
      startBtn.disabled = false;
    } catch (e) {
      progWrap.style.display = "none";
      setStatus("Load failed: " + e.message, "err");
      console.error("ONNX load error:", e);
    }
  }

  /* confidence */
  confSlider.addEventListener("input", () => {
    confThresh = confSlider.value / 100;
    confValEl.textContent = confThresh.toFixed(2);
  });

  /* start / stop */
  startBtn.addEventListener("click", async () => {
    if (running) {
      stopCamera();
      return;
    }

    if (!session) {
      setStatus("Model is not loaded yet", "err");
      return;
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      });

      video.srcObject = stream;
      await video.play();

      viewport.style.display = "block";
      running = true;
      startBtn.textContent = "Stop camera";
      startBtn.classList.add("running");
      setStatus("Detecting…", "ok");
      loop();
    } catch (e) {
      setStatus("Camera error: " + e.message, "err");
    }
  });

  function stopCamera() {
    running = false;

    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach((t) => t.stop());

    stream = null;
    viewport.style.display = "none";
    startBtn.textContent = "Start camera";
    startBtn.classList.remove("running");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    detPanel.innerHTML = "";
    fpsBadge.textContent = "— fps";
    setStatus("Camera stopped — model still loaded", "info");
  }

  /* offscreen preprocessing canvas */
  const off = document.createElement("canvas");
  off.width = off.height = INPUT;
  const offCtx = off.getContext("2d", { willReadFrequently: true });

  function preprocess() {
    offCtx.drawImage(video, 0, 0, INPUT, INPUT);
    const { data } = offCtx.getImageData(0, 0, INPUT, INPUT);
    const area = INPUT * INPUT;
    const f32 = new Float32Array(3 * area);

    for (let i = 0; i < area; i++) {
      f32[i] = data[i * 4] / 255;
      f32[area + i] = data[i * 4 + 1] / 255;
      f32[2 * area + i] = data[i * 4 + 2] / 255;
    }

    return new ort.Tensor("float32", f32, [1, 3, INPUT, INPUT]);
  }

  function iou(a, b) {
    const x1 = Math.max(a[0], b[0]);
    const y1 = Math.max(a[1], b[1]);
    const x2 = Math.min(a[2], b[2]);
    const y2 = Math.min(a[3], b[3]);
    const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);

    return (
      inter /
      ((a[2] - a[0]) * (a[3] - a[1]) +
        (b[2] - b[0]) * (b[3] - b[1]) -
        inter +
        1e-6)
    );
  }

  function nms(dets) {
    dets.sort((a, b) => b.conf - a.conf);
    const kept = [];

    for (const d of dets) {
      if (!kept.some((k) => iou(d.box, k.box) > 0.45)) {
        kept.push(d);
      }
    }

    return kept;
  }

  function postprocess(out) {
    const data = out.data;
    const nCls = CLASSES.length;
    const nBox = out.dims[2];
    const raw = [];

    for (let i = 0; i < nBox; i++) {
      const cx = data[0 * nBox + i];
      const cy = data[1 * nBox + i];
      const w = data[2 * nBox + i];
      const h = data[3 * nBox + i];

      let best = 0;
      let bi = 0;

      for (let c = 0; c < nCls; c++) {
        const s = data[(4 + c) * nBox + i];
        if (s > best) {
          best = s;
          bi = c;
        }
      }

      if (best >= confThresh) {
        raw.push({
          box: [
            (cx - w / 2) / INPUT,
            (cy - h / 2) / INPUT,
            (cx + w / 2) / INPUT,
            (cy + h / 2) / INPUT,
          ],
          conf: best,
          cls: bi,
        });
      }
    }

    return nms(raw);
  }

  function drawBoxes(dets) {
    const cW = canvas.width;
    const cH = canvas.height;
    ctx.clearRect(0, 0, cW, cH);

    for (const d of dets) {
      const [x1n, y1n, x2n, y2n] = d.box;
      const x = x1n * cW;
      const y = y1n * cH;
      const bw = (x2n - x1n) * cW;
      const bh = (y2n - y1n) * cH;
      const col = COLORS[d.cls];

      ctx.fillStyle = col + "28";
      ctx.fillRect(x, y, bw, bh);

      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, y, bw, bh);

      const bl = Math.min(14, bw * 0.25, bh * 0.25);
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.moveTo(x, y + bl);
      ctx.lineTo(x, y);
      ctx.lineTo(x + bl, y);

      ctx.moveTo(x + bw - bl, y);
      ctx.lineTo(x + bw, y);
      ctx.lineTo(x + bw, y + bl);

      ctx.moveTo(x, y + bh - bl);
      ctx.lineTo(x, y + bh);
      ctx.lineTo(x + bl, y + bh);

      ctx.moveTo(x + bw - bl, y + bh);
      ctx.lineTo(x + bw, y + bh);
      ctx.lineTo(x + bw, y + bh - bl);
      ctx.stroke();

      const label = `${CLASSES[d.cls]} ${(d.conf * 100).toFixed(0)}%`;
      ctx.font = "600 11px sans-serif";
      const tw = ctx.measureText(label).width + 10;
      const lh = 18;
      const ly = y > lh + 4 ? y - lh - 4 : y + 2;

      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(x, ly, tw, lh, 4);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.fillText(label, x + 5, ly + 13);
    }
  }

  function updateDetPanel(dets) {
    detPanel.innerHTML = "";
    const counts = {};

    for (const d of dets) {
      counts[d.cls] = (counts[d.cls] || 0) + 1;
    }

    for (const [cls, cnt] of Object.entries(counts)) {
      const i = parseInt(cls, 10);
      const chip = document.createElement("div");
      chip.className = "det-chip";
      chip.style.cssText = `background:${COLORS[i]}22;border:0.5px solid ${COLORS[i]}66;color:${COLORS[i]}`;
      chip.textContent = CLASSES[i] + (cnt > 1 ? ` ×${cnt}` : "");
      detPanel.appendChild(chip);
    }
  }

  function loop() {
    if (!running) return;

    rafId = requestAnimationFrame(loop);

    if (video.readyState < 2) return;

    const rect = video.getBoundingClientRect();
    if (canvas.width !== rect.width || canvas.height !== rect.height) {
      canvas.width = rect.width || video.videoWidth;
      canvas.height = rect.height || video.videoHeight;
    }

    frames++;
    const now = performance.now();
    if (now - lastFps >= 1000) {
      fpsBadge.textContent = frames + " fps";
      frames = 0;
      lastFps = now;
    }

    if (inferBusy || !session) return;

    inferBusy = true;
    const tensor = preprocess();

    session
      .run({ [session.inputNames[0]]: tensor })
      .then((out) => {
        const dets = postprocess(out[session.outputNames[0]]);
        drawBoxes(dets);
        updateDetPanel(dets);
      })
      .catch((e) => {
        console.error("Inference error:", e);
      })
      .finally(() => {
        inferBusy = false;
      });
  }

  /* load the hardcoded model on page load */
  window.addEventListener("load", loadModel);
</script>
